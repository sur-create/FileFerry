name: Build Installers

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build binary
        run: python scripts/build_binary.py --clean

      - name: Build installer
        run: powershell -ExecutionPolicy Bypass -File packaging/windows/build_inno.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fileferry-windows-installer
          path: dist/installer/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Build binary and pkg
        run: |
          python scripts/build_binary.py --clean
          bash packaging/macos/build_pkg.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fileferry-macos-installer
          path: dist/installer/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Build binary
        run: python scripts/build_binary.py --clean

      - name: Build deb/rpm installers
        run: |
          bash packaging/linux/build_deb.sh
          bash packaging/linux/build_rpm.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fileferry-linux-installers
          path: dist/installer/*

  release:
    name: Publish GitHub Release
    needs:
      - build-windows
      - build-macos
      - build-linux
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=edge-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "name=edge-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
          generate_release_notes: true
          working_directory: release-assets
          files: |
            **/*.deb
            **/*.rpm
            **/*.exe
            **/*.pkg
