name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build binary
        run: python scripts/build_binary.py --clean

      - name: Build installer
        run: powershell -ExecutionPolicy Bypass -File packaging/windows/build_inno.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fileferry-windows-installer
          path: dist/installer/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Build binary and pkg
        run: |
          python scripts/build_binary.py --clean
          bash packaging/macos/build_pkg.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fileferry-macos-installer
          path: dist/installer/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Build binary
        run: python scripts/build_binary.py --clean

      - name: Build deb/rpm installers
        run: |
          bash packaging/linux/build_deb.sh
          bash packaging/linux/build_rpm.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fileferry-linux-installers
          path: dist/installer/*
